# See https://github.com/lima-vm/lima/blob/master/templates/default.yaml for all lima options

# To use a locally built image instead, replace the images section above with:
# images:
#   - location: "./result/nixos.qcow2"
#     arch: aarch64
images:
  - location: https://github.com/saronic-technologies/nixos-lima/releases/download/v1.2.0/nixos-determinate-v1.2.0-aarch64.qcow2
    arch: aarch64
    digest: sha512:46399fd235420fe296bcfe134ff6ef7030bd1666ca84e1c50a9579ea4a39eb3fb900d9247339339a2e0557a729ea257d7a6b57b0638dc06e41da8f264e92fe6d
  - location: https://github.com/saronic-technologies/nixos-lima/releases/download/v1.2.0/nixos-determinate-v1.2.0-x86_64.qcow2
    arch: x86_64
    digest: sha512:8c72727bc4f15ef343e089b5945b30a3f74eff095035cf57260476297092a921fda3d75fabfb1b43255efd228326f8ca52f6892401c96f844e0129a2e21262d3

mounts:
  - location: '~'
    writable: true

rosetta:
  enabled: true

cpus: 12
memory: 40GiB
disk: 1024GiB

portForwards:
  # NixOS intercepts UDP port 68 (DHCP), which causes Lima's port-forwarding to
  # capture host DHCP packets. Ignore it explicitly to prevent network issues.
  # See: https://github.com/nixos-lima/nixos-lima/issues/50
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true

containerd:
  system: false
  user: false

# user:
#   name: "developer"

# ssh:
#   localPort: 60022
